<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Lista de Tarefas</title>
</head>
<body>
    <main>
        <h1>Minha Lista de Tarefas</h1>
        <form action="">
            <input type="text" id="tarefa" placeholder="Digite uma tarefa">
            <button class="btn addTarefa" onclick="addTarefa()" type="button">Adicionar</button>
        </form>
        <div id="container">
            <ul id="listaTarefas">
            </ul>
        </div>
        <button class="btn limpa" onclick="limpar()">Limpar</button>
    </main>
    <script src="script.js"></script>
</body>
</html>
